<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Viewer - Vermont Property Search</title>
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h1>Plot Viewer</h1>
                <p class="subtitle">Vermont Property Search</p>
            </div>

            <div class="sidebar-content">
                <div class="section">
                    <h2>Search</h2>
                    <div class="input-group">
                        <input type="text" id="search-input" placeholder="Town, address, or SPAN...">
                    </div>
                    <button id="search-btn" class="btn-primary">Search</button>
                </div>

                <div class="section">
                    <h2>Filters</h2>
                    <div class="filter-grid">
                        <div class="filter-field">
                            <label>Min Acres</label>
                            <input type="number" id="min-acres" placeholder="0" min="0">
                        </div>
                        <div class="filter-field">
                            <label>Max Acres</label>
                            <input type="number" id="max-acres" placeholder="1000">
                        </div>
                        <div class="filter-field">
                            <label>Max Price</label>
                            <input type="number" id="max-price" placeholder="500000">
                        </div>
                        <div class="filter-field">
                            <label>&nbsp;</label>
                            <button id="apply-filters" class="btn-secondary">Apply</button>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h2>Map Layers</h2>
                    <label class="layer-toggle">
                        <div class="layer-toggle-info">
                            <div class="layer-icon parcels">📐</div>
                            <div>
                                <div class="layer-toggle-text">Parcel Boundaries</div>
                                <div class="layer-toggle-desc">Property lines from VCGI</div>
                            </div>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="layer-parcels" checked>
                            <span class="slider"></span>
                        </div>
                    </label>
                    <label class="layer-toggle">
                        <div class="layer-toggle-info">
                            <div class="layer-icon terrain">⛰️</div>
                            <div>
                                <div class="layer-toggle-text">3D Terrain</div>
                                <div class="layer-toggle-desc">Elevation with hillshade</div>
                            </div>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="layer-terrain">
                            <span class="slider"></span>
                        </div>
                    </label>
                    <label class="layer-toggle">
                        <div class="layer-toggle-info">
                            <div class="layer-icon satellite">🛰️</div>
                            <div>
                                <div class="layer-toggle-text">Satellite</div>
                                <div class="layer-toggle-desc">Aerial imagery</div>
                            </div>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="layer-satellite">
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>

                <div class="section" id="parcel-info" style="display: none;">
                    <h2>Selected Parcel</h2>
                    <div id="parcel-details"></div>
                    <button id="save-favorite" class="btn-primary">⭐ Save to Favorites</button>
                </div>

                <div class="section">
                    <h2>Favorites</h2>
                    <div id="favorites-list">
                        <p class="empty">No favorites yet</p>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="credits">
                    <span>Data: <a href="https://geodata.vermont.gov/pages/parcels" target="_blank">VCGI</a></span>
                    <span>Maps: <a href="https://maplibre.org/" target="_blank">MapLibre</a></span>
                </div>
            </div>
        </nav>

        <main id="map-container">
            <div id="map"></div>
            <div id="loading-indicator"></div>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Searching...</p>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <!-- No more Turf.js - using built-in geometry calculations -->
    <script src="app.js?v=20260309b"></script>
</body>
</html>
